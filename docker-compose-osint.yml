services:
  mongodb:
    image: mongo:7
    container_name: meteoredit-db
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - internal

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: meteoredit-server
    restart: unless-stopped
    shm_size: '256mb'
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/meteoredit
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-15m}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-7d}
      - PORT=3001
      - YJS_PORT=3002
      - UPLOAD_DIR=./uploads
      - COOKIE_ENCRYPTION_KEY=${COOKIE_ENCRYPTION_KEY:?COOKIE_ENCRYPTION_KEY is required}
      - LANGUAGETOOL_URL=http://languagetool:8010
      - OLLAMA_URL=http://ollama:11434
      - COBALT_URL=http://cobalt-api:9000
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - yjs-data:/app/yjs-docs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - internal

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: meteoredit-client
    restart: unless-stopped
    ports:
      - "100.64.0.2:5173:443"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - internal

  ollama:
    image: ollama/ollama:latest
    container_name: meteoredit-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - internal

  languagetool:
    image: erikvl87/languagetool:latest
    container_name: meteoredit-languagetool
    restart: unless-stopped
    environment:
      - Java_Xms=256m
      - Java_Xmx=1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/v2/languages"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - internal

  cobalt-api:
    image: ghcr.io/imputnet/cobalt:10
    container_name: meteoredit-cobalt
    restart: unless-stopped
    environment:
      - API_URL=http://cobalt-api:9000
      - CORS_WILDCARD=true
      - PROCESSING_PRIORITY=false
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - internal

volumes:
  mongo-data:
  uploads:
  yjs-data:
  ollama-data:

networks:
  internal:
    driver: bridge

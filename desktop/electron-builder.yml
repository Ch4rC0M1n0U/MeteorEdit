appId: com.meteoredit.desktop
productName: MeteorEdit
copyright: Copyright © 2026

directories:
  output: release

files:
  - dist/**/*
  - resources/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.png
  uninstallerIcon: resources/icon.png
  installerHeaderIcon: resources/icon.png

publish:
  provider: github
  owner: Deshimaru
  repo: MeteorEdit

protocols:
  - name: MeteorEdit
    schemes:
      - meteoredit

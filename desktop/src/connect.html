<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeteorEdit — Connexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
    }
    .container {
      text-align: center;
      max-width: 420px;
      width: 100%;
      padding: 40px;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      color: #6C63FF;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #888;
      margin-bottom: 32px;
      font-size: 0.9rem;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }
    input {
      padding: 12px 16px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #6C63FF; }
    input::placeholder { color: #555; }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #6C63FF;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #5a52d5; }
    button:disabled { background: #444; cursor: not-allowed; }
    .status {
      margin-top: 16px;
      font-size: 0.85rem;
      min-height: 20px;
    }
    .status.error { color: #ff6b6b; }
    .status.success { color: #51cf66; }
    .status.loading { color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">MeteorEdit</div>
    <div class="subtitle">Entrez l'adresse de votre serveur</div>
    <div class="input-group">
      <input
        type="url"
        id="serverUrl"
        placeholder="https://meteoredit.example.com"
        autofocus
      />
      <button id="connectBtn" onclick="testConnection()">Tester la connexion</button>
    </div>
    <div id="status" class="status"></div>
  </div>
  <script>
    const urlInput = document.getElementById('serverUrl');
    const connectBtn = document.getElementById('connectBtn');
    const statusEl = document.getElementById('status');

    // Load saved URL if any
    window.electronAPI.getServerUrl().then(url => {
      if (url) urlInput.value = url;
    });

    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') testConnection();
    });

    async function testConnection() {
      const url = urlInput.value.trim().replace(/\/+$/, '');
      if (!url) {
        statusEl.textContent = 'Veuillez entrer une URL';
        statusEl.className = 'status error';
        return;
      }

      connectBtn.disabled = true;
      statusEl.textContent = 'Connexion en cours...';
      statusEl.className = 'status loading';

      try {
        const ok = await window.electronAPI.testServerConnection(url);
        if (ok) {
          statusEl.textContent = 'Connecté ! Chargement...';
          statusEl.className = 'status success';
          await window.electronAPI.setServerUrl(url);
        } else {
          statusEl.textContent = 'Serveur injoignable. Vérifiez l\'URL.';
          statusEl.className = 'status error';
        }
      } catch (err) {
        statusEl.textContent = 'Erreur de connexion. Vérifiez l\'URL.';
        statusEl.className = 'status error';
      }
      connectBtn.disabled = false;
    }
  </script>
</body>
</html>

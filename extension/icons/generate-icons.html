<!DOCTYPE html>
<html>
<head>
  <title>Generate MeteorEdit Cookie Bridge Icons</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #1a1a2e; color: #e2e8f0; }
    canvas { border: 1px solid #2d2d4a; margin: 10px; }
    a { color: #38bdf8; display: block; margin: 8px 0; }
    h1 { color: #38bdf8; }
    p { color: #94a3b8; }
  </style>
</head>
<body>
  <h1>MeteorEdit Cookie Bridge - Icon Generator</h1>
  <p>Right-click each icon and "Save image as..." to the <code>extension/icons/</code> folder.</p>
  <div>
    <h3>icon16.png</h3>
    <canvas id="c16" width="16" height="16"></canvas>
    <a id="dl16" download="icon16.png">Download icon16.png</a>
  </div>
  <div>
    <h3>icon48.png</h3>
    <canvas id="c48" width="48" height="48"></canvas>
    <a id="dl48" download="icon48.png">Download icon48.png</a>
  </div>
  <div>
    <h3>icon128.png</h3>
    <canvas id="c128" width="128" height="128"></canvas>
    <a id="dl128" download="icon128.png">Download icon128.png</a>
  </div>
  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      const r = size / 2;

      // Background circle
      ctx.beginPath();
      ctx.arc(r, r, r - 1, 0, Math.PI * 2);
      ctx.fillStyle = '#16213e';
      ctx.fill();
      ctx.strokeStyle = '#38bdf8';
      ctx.lineWidth = Math.max(1, size / 16);
      ctx.stroke();

      // Cookie / bridge icon: two curved brackets with a line
      const s = size / 128; // scale factor
      ctx.strokeStyle = '#38bdf8';
      ctx.lineWidth = Math.max(1.5, size / 12);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // Meteor shape: a circle with a tail
      const cx = r;
      const cy = r;
      const mr = size * 0.2;

      // Meteor body
      ctx.beginPath();
      ctx.arc(cx + mr * 0.3, cy - mr * 0.3, mr, 0, Math.PI * 2);
      ctx.fillStyle = '#38bdf8';
      ctx.fill();

      // Meteor tail
      ctx.beginPath();
      ctx.moveTo(cx + mr * 0.3 - mr * 0.7, cy - mr * 0.3 + mr * 0.7);
      ctx.lineTo(cx - mr * 2.2, cy + mr * 1.8);
      ctx.lineTo(cx + mr * 0.3 - mr * 0.3, cy - mr * 0.3 + mr * 1.0);
      ctx.lineTo(cx - mr * 1.8, cy + mr * 2.2);
      ctx.strokeStyle = '#38bdf8';
      ctx.lineWidth = Math.max(1, size / 16);
      ctx.stroke();

      // Download link
      const id = 'dl' + size;
      document.getElementById(id).href = canvas.toDataURL('image/png');
    }

    drawIcon(document.getElementById('c16'), 16);
    drawIcon(document.getElementById('c48'), 48);
    drawIcon(document.getElementById('c128'), 128);
  </script>
</body>
</html>

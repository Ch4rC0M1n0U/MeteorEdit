<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeteorEdit Cookie Bridge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      min-height: 200px;
      background: #1a1a2e;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
      border-bottom: 1px solid #2d2d4a;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 28px;
      height: 28px;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: #f1f5f9;
      letter-spacing: -0.2px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background-color 0.3s;
    }

    .status-dot.online {
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
    }

    .status-dot.offline {
      background: #ef4444;
      box-shadow: 0 0 6px rgba(239, 68, 68, 0.4);
    }

    .status-dot.checking {
      background: #f59e0b;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Setup Message */
    .setup-message {
      padding: 32px 24px;
      text-align: center;
    }

    .setup-message .icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .setup-message h2 {
      font-size: 15px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 8px;
    }

    .setup-message p {
      color: #94a3b8;
      font-size: 12.5px;
      margin-bottom: 16px;
    }

    .setup-message a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #38bdf8;
      text-decoration: none;
      font-weight: 500;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 8px;
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.2);
      transition: all 0.2s;
    }

    .setup-message a:hover {
      background: rgba(56, 189, 248, 0.18);
      border-color: rgba(56, 189, 248, 0.35);
    }

    /* Platform List */
    .platform-list {
      padding: 8px 12px;
      max-height: 380px;
      overflow-y: auto;
    }

    .platform-list::-webkit-scrollbar {
      width: 5px;
    }

    .platform-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .platform-list::-webkit-scrollbar-thumb {
      background: #2d2d4a;
      border-radius: 4px;
    }

    .platform-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      margin-bottom: 4px;
      border-radius: 10px;
      background: #16213e;
      border: 1px solid #2d2d4a;
      transition: border-color 0.2s;
    }

    .platform-item:hover {
      border-color: #3b3b5c;
    }

    .platform-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .platform-icon {
      font-size: 20px;
      flex-shrink: 0;
      width: 28px;
      text-align: center;
    }

    .platform-details {
      flex: 1;
      min-width: 0;
    }

    .platform-name {
      font-size: 13px;
      font-weight: 500;
      color: #f1f5f9;
    }

    .platform-status {
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .platform-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .platform-status.found .dot {
      background: #22c55e;
    }

    .platform-status.found {
      color: #86efac;
    }

    .platform-status.not-found .dot {
      background: #64748b;
    }

    .platform-status.not-found {
      color: #64748b;
    }

    .platform-actions {
      flex-shrink: 0;
      margin-left: 10px;
    }

    .btn-send {
      padding: 5px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.2px;
    }

    .btn-send.active {
      background: #38bdf8;
      color: #0c1222;
    }

    .btn-send.active:hover {
      background: #7dd3fc;
      transform: translateY(-1px);
    }

    .btn-send.disabled {
      background: #1e293b;
      color: #475569;
      cursor: default;
    }

    .btn-send.sending {
      background: #f59e0b;
      color: #0c1222;
      cursor: wait;
    }

    .btn-send.success {
      background: #22c55e;
      color: #0c1222;
    }

    .btn-send.error {
      background: #ef4444;
      color: #fff;
    }

    /* Send All */
    .send-all-bar {
      padding: 10px 16px;
      border-top: 1px solid #2d2d4a;
      border-bottom: 1px solid #2d2d4a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .send-all-bar .count {
      font-size: 12px;
      color: #94a3b8;
    }

    .btn-send-all {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: #0c1222;
      transition: all 0.2s;
    }

    .btn-send-all:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
    }

    .btn-send-all:disabled {
      opacity: 0.5;
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    /* Footer */
    .footer {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid #2d2d4a;
    }

    .footer-link {
      color: #64748b;
      text-decoration: none;
      font-size: 11.5px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    .footer-link:hover {
      color: #38bdf8;
    }

    .footer-version {
      font-size: 10.5px;
      color: #475569;
    }

    /* Loading */
    .loading {
      padding: 40px 24px;
      text-align: center;
      color: #64748b;
    }

    .loading .spinner {
      width: 24px;
      height: 24px;
      border: 2.5px solid #2d2d4a;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #16213e;
      color: #f1f5f9;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      border: 1px solid #2d2d4a;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      border-color: #22c55e;
    }

    .toast.error {
      border-color: #ef4444;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Loading state -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <div>Loading...</div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
